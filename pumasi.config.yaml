pumasi:
  defaults:
    command: "node C:/Windows/nvm/v22.15.1/node_modules/@openai/codex/bin/codex.js exec --dangerously-bypass-approvals-and-sandbox"
    emoji: "🤖"

  tasks:
    # ────────────────────────────────────────────────────────────
    # Task 1 · driver-detail (A04 주문 상세 화면)
    # ────────────────────────────────────────────────────────────
    - name: driver-detail
      instruction: |
        D:/MOUNT1/apps/driver/app/(driver)/order/[orderId]/page.tsx 신규 작성.

        ## 시그니처
        ```ts
        export default async function OrderDetailPage(props: {
          params: Promise<{ orderId: string }>;
        }): Promise<ReactElement>
        ```

        ## 동작
        1. `requireRole(['technician'])` (RedirectError → /login redirect)
        2. `getServerClient()` 로 두 쿼리 병렬 (Promise.all):
           - orders 테이블: `*` (자기 배차건만 RLS 자동 필터)
           - v_customer_for_technician 뷰: 자기 배차건 고객 평문 정보
        3. 둘 중 하나라도 없으면 (`!data`) → notFound() 호출 (next/navigation)
        4. UI 컨테이너: `min-h-dvh bg-background safe-top safe-bottom max-w-screen-md mx-auto px-4 py-6 space-y-4`

        ## UI 섹션 (Card 단위로 분리)
        - 헤더: 뒤로가기 (Link href="/today" + ChevronLeft 아이콘) + h1 "주문 상세" + 상태 Badge
        - 시각 카드: 예약 시각 (Intl.DateTimeFormat ko-KR 'yyyy년 M월 d일 (요일) HH:mm')
        - 고객 카드: 지역 (sido + sigungu) · 전화 뒷자리 (***-****-{phone_tail4})
        - TV 카드: brand · model · size_inch
        - 옵션·가격 카드: option_selected (A_stand/B_drill/C_no_drill 한글 라벨) · price_option_b · price_option_c · 차액 (b - c)
        - 액션 버튼 영역 (status 별 분기):
          · status='assigned' → "출발" Button (size=lg w-full, Link href="/order/{id}/start")
          · status='en_route' → "현장 도착" Button
          · status='on_site' → "사전 통화 기록" + "시공 시작" Button 2개
          · status='in_progress' → "시공 완료" Button (Link href="/order/{id}/complete")
          · 그 외 → 안내 텍스트 only

        ## 라이브러리
        - `@mount/db` getServerClient
        - `@mount/lib` requireRole, RedirectError, ForbiddenError
        - `@mount/ui` Card, CardHeader, CardTitle, CardContent, Badge, Button, Separator
        - `lucide-react` ChevronLeft, MapPin, Phone, Tv, DollarSign
        - `next/link`, `next/navigation` (redirect, notFound)

        ## 금지
        - 클라이언트 fetch · SWR/TanStack Query · 외부 검증 라이브러리 사용 금지
        - any · @ts-ignore 사용 금지
        - inline style 금지

      gates:
        - name: "page.tsx 존재"
          command: "test -f 'D:/MOUNT1/apps/driver/app/(driver)/order/[orderId]/page.tsx'"
        - name: "requireRole technician"
          command: "grep -q 'requireRole' 'D:/MOUNT1/apps/driver/app/(driver)/order/[orderId]/page.tsx' && grep -q 'technician' 'D:/MOUNT1/apps/driver/app/(driver)/order/[orderId]/page.tsx'"
        - name: "Promise.all + notFound"
          command: "grep -q 'Promise.all' 'D:/MOUNT1/apps/driver/app/(driver)/order/[orderId]/page.tsx' && grep -q 'notFound' 'D:/MOUNT1/apps/driver/app/(driver)/order/[orderId]/page.tsx'"
        - name: "v_customer_for_technician 사용"
          command: "grep -q 'v_customer_for_technician' 'D:/MOUNT1/apps/driver/app/(driver)/order/[orderId]/page.tsx'"
        - name: "any 사용 없음"
          command: "! grep -nE ': any\\b|as any\\b' 'D:/MOUNT1/apps/driver/app/(driver)/order/[orderId]/page.tsx'"

    # ────────────────────────────────────────────────────────────
    # Task 2 · admin-dispatch (B05 배차 콘솔)
    # ────────────────────────────────────────────────────────────
    - name: admin-dispatch
      instruction: |
        D:/MOUNT1/apps/admin/app/(admin)/dispatch/page.tsx + ./assign-form.tsx 신규 작성.

        ## 시그니처
        ```ts
        // page.tsx (Server Component)
        export default async function DispatchPage(): Promise<ReactElement>

        // assign-form.tsx (Client Component, 'use client')
        export interface AssignFormProps {
          orders: Array<{ id: string; tv: string; region: string; scheduled_at: string | null }>;
          technicians: Array<{ id: string; display_name: string; grade: string }>;
        }
        export function AssignForm(props: AssignFormProps): ReactElement
        ```

        ## page.tsx 동작
        1. `requireRole({ adminRoles: ['super_admin', 'dispatch_admin'] })` (RedirectError → /login)
        2. `getServerClient()` 로 병렬 (Promise.all):
           - 미배차 주문: `from('v_orders_dashboard').select('id, tv_display, address_region_sigungu, scheduled_installation_at').is('technician_name', null).limit(50)`
           - 활성 기사: `from('technicians').select('id, display_name, grade').eq('status', 'active')`
        3. AssignForm 에 매핑된 데이터 전달 (필드명 변환)
        4. 컨테이너: `min-h-dvh bg-background max-w-screen-2xl mx-auto px-6 py-8 space-y-6`
        5. 헤더: h1 "배차 콘솔" + 미배차 카운트 표시

        ## assign-form.tsx 동작
        - useState: selectedOrderId · selectedTechnicianId · isPending
        - 좌측: 미배차 주문 리스트 (Card 단위, 클릭하면 selected)
        - 우측: 활성 기사 리스트 (Card 단위, 클릭하면 selected)
        - 하단: "배차 확정" Button — 둘 다 선택돼야 활성화
        - 버튼 클릭 시 Server Action `assignOrderAction(orderId, technicianId)` 호출
        - 성공 시: window.location.reload() 또는 router.refresh()
        - 추천 알고리즘 stub: 현재는 단순 리스트만, 향후 RPC `rpc_admin_dispatch` 연결

        ## 별도 actions.ts 파일
        - 'use server'
        - `export async function assignOrderAction(orderId: string, technicianId: string): Promise<{ ok: boolean; error?: string }>`
        - 본문: `getServerClient().from('orders').update({ assigned_technician_id, assigned_at: new Date().toISOString(), status: 'assigned' }).eq('id', orderId)`
        - error 처리: 실패 시 { ok: false, error: '배차에 실패했어요. 다시 시도해 주세요.' }

        ## 라이브러리
        - `@mount/db` getServerClient
        - `@mount/lib` requireRole, RedirectError, ForbiddenError
        - `@mount/ui` Card · CardHeader · CardContent · Button · Badge
        - `lucide-react` UserCheck, MapPin

        ## 금지
        - 외부 폼 라이브러리 금지
        - any 사용 금지

      gates:
        - name: "3 파일 존재"
          command: "test -f 'D:/MOUNT1/apps/admin/app/(admin)/dispatch/page.tsx' && test -f 'D:/MOUNT1/apps/admin/app/(admin)/dispatch/assign-form.tsx' && test -f 'D:/MOUNT1/apps/admin/app/(admin)/dispatch/actions.ts'"
        - name: "Server Action use server"
          command: "head -3 'D:/MOUNT1/apps/admin/app/(admin)/dispatch/actions.ts' | grep -q 'use server'"
        - name: "use client form"
          command: "head -3 'D:/MOUNT1/apps/admin/app/(admin)/dispatch/assign-form.tsx' | grep -q 'use client'"
        - name: "requireRole adminRoles"
          command: "grep -q 'adminRoles' 'D:/MOUNT1/apps/admin/app/(admin)/dispatch/page.tsx'"
        - name: "any 사용 없음"
          command: "! grep -nE ': any\\b|as any\\b' 'D:/MOUNT1/apps/admin/app/(admin)/dispatch/page.tsx' 'D:/MOUNT1/apps/admin/app/(admin)/dispatch/assign-form.tsx' 'D:/MOUNT1/apps/admin/app/(admin)/dispatch/actions.ts'"

    # ────────────────────────────────────────────────────────────
    # Task 3 · driver-workflow (A05~A08 시공 4단계 묶음)
    # ────────────────────────────────────────────────────────────
    - name: driver-workflow
      instruction: |
        D:/MOUNT1/apps/driver/app/(driver)/order/[orderId]/ 하위에 4단계 화면 + Server Actions 작성.

        ## 생성 파일 (8개)
        - start/page.tsx        — A06 시공 시작 화면
        - start/actions.ts      — RPC `rpc_technician_start_installation` 호출
        - photos/page.tsx       — A07 사진 업로드 화면
        - photos/actions.ts     — Supabase Storage 업로드
        - complete/page.tsx     — A08 시공 완료 화면
        - complete/actions.ts   — RPC `rpc_technician_complete` 호출
        - cancel/page.tsx       — A10 취소 리포트 화면 (최소)
        - cancel/actions.ts     — cancellation_reports insert

        ## 공통 시그니처
        ```ts
        // 모든 page.tsx
        export default async function Page(props: {
          params: Promise<{ orderId: string }>;
        }): Promise<ReactElement>
        ```

        ## 각 화면 핵심 동작 (간결)

        ### start/page.tsx + actions.ts
        - requireRole(['technician']) → orders 조회 → status='on_site' 인지 검증
        - 화면: 큰 "시공 시작" Button (size=lg w-full) + 안내 ("필수 사진 2장 (TV 화면, 벽) 촬영 후 누르세요")
        - 액션 버튼 → Server Action `startInstallationAction(orderId)` → `client.rpc('rpc_technician_start_installation', { p_order_id: orderId })` 호출
        - 성공 시 redirect('/order/{id}/photos')
        - 실패 시 (에러 메시지에 'missing_pre_photos' 포함) → "사진 2장이 부족해요" 안내

        ### photos/page.tsx + actions.ts
        - requireRole(['technician']) → orders + photos 조회
        - 화면: 6 슬롯 grid (pre_tv_screen, pre_wall, post_front, post_left, post_right, extra)
          각 슬롯에 file input (capture="environment") + 미리보기
        - Server Action `uploadPhotoAction(orderId, slot, file)` → Supabase Storage `photos-hot/{tech_id}/{order_id}/{slot}_{uuid}.webp` upload
          + photos 테이블 insert (storage_tier='hot', supabase_path)
        - 하단 "완료" Button → Link href="/order/{id}/complete"

        ### complete/page.tsx + actions.ts
        - requireRole(['technician']) → orders 조회 → status='in_progress' 검증
        - 화면: 무타공 / 타공 전환 라디오 선택 + 합의 방법 선택 (verbal/sms/phone) + 큰 "완료" Button
        - Server Action `completeInstallationAction({ orderId, variant, conversionMethod? })` → RPC `rpc_technician_complete` 호출
        - 성공 시 redirect('/today')

        ### cancel/page.tsx + actions.ts (최소)
        - requireRole(['technician']) → orders 조회
        - 화면: 사유 카테고리 select (no_drill_structural / conversion_declined / customer_absent_3times / address_issue / tv_model_mismatch / etc) + 메모 textarea (200자) + 사진 ID 배열 (입력 stub) + 서명 URL stub
        - Server Action `cancelOrderAction(...)` → cancellation_reports insert + orders status='cancel_requested' update
        - 성공 시 redirect('/today')

        ## 라이브러리
        - `@mount/db` getServerClient
        - `@mount/lib` requireRole, RedirectError
        - `@mount/ui` Card · Button · Input · Badge
        - `next/navigation` redirect, notFound
        - useActionState (Client Component 일 때)

        ## 금지
        - 외부 폼 라이브러리 금지
        - any 사용 금지

      gates:
        - name: "8 파일 존재"
          command: "for d in start photos complete cancel; do test -f \"D:/MOUNT1/apps/driver/app/(driver)/order/[orderId]/$d/page.tsx\" || exit 1; test -f \"D:/MOUNT1/apps/driver/app/(driver)/order/[orderId]/$d/actions.ts\" || exit 1; done"
        - name: "RPC start 호출"
          command: "grep -q 'rpc_technician_start_installation' 'D:/MOUNT1/apps/driver/app/(driver)/order/[orderId]/start/actions.ts'"
        - name: "RPC complete 호출"
          command: "grep -q 'rpc_technician_complete' 'D:/MOUNT1/apps/driver/app/(driver)/order/[orderId]/complete/actions.ts'"
        - name: "Storage upload"
          command: "grep -q 'photos-hot' 'D:/MOUNT1/apps/driver/app/(driver)/order/[orderId]/photos/actions.ts'"
        - name: "cancellation_reports insert"
          command: "grep -q 'cancellation_reports' 'D:/MOUNT1/apps/driver/app/(driver)/order/[orderId]/cancel/actions.ts'"
