    # ────────────────────────────────────────────────────────────
    # Task 5 · driver 앱 PWA Service Worker (@serwist/next)
    # ────────────────────────────────────────────────────────────
    - name: pwa-serwist
      instruction: |
        D:/MOUNT1/apps/driver/ 에 PWA Service Worker (@serwist/next) 도입.

        ## 컨텍스트
        - Next.js 16.2.4 App Router · React 19
        - 기존 next.config.ts 에 withSentryConfig 가 적용됨 (D:/MOUNT1/apps/driver/next.config.ts)
        - 기존 manifest.json: D:/MOUNT1/apps/driver/public/manifest.json
        - 기사앱 = 모바일 PWA · 현장(4G/5G) 가용성 핵심
        - apps/admin 은 PWA 적용 안 함 (이번 태스크 범위 아님 — admin/ 건드리지 말 것)

        ## 생성 파일
        - D:/MOUNT1/apps/driver/app/sw.ts — Service Worker entry (serwist defaultCache + precacheRoutes)
        - D:/MOUNT1/apps/driver/app/offline/page.tsx — 오프라인 fallback 페이지 (간단한 안내)

        ## 수정 파일
        - D:/MOUNT1/apps/driver/next.config.ts — withSerwist + withSentryConfig 체이닝
        - D:/MOUNT1/apps/driver/package.json — @serwist/next + serwist devDependency 추가
        - D:/MOUNT1/apps/driver/public/manifest.json — start_url · scope · icons 등 보강
        - D:/MOUNT1/apps/driver/app/layout.tsx — viewport 또는 metadata 변경 없음 (참조만)

        ## 시그니처 / 구조

        sw.ts:
          import { defaultCache } from '@serwist/next/worker';
          import type { PrecacheEntry, SerwistGlobalConfig } from 'serwist';
          import { Serwist } from 'serwist';

          declare global {
            interface WorkerGlobalScope extends SerwistGlobalConfig {
              __SW_MANIFEST: (PrecacheEntry | string)[] | undefined;
            }
          }

          declare const self: ServiceWorkerGlobalScope;

          const serwist = new Serwist({
            precacheEntries: self.__SW_MANIFEST,
            skipWaiting: true,
            clientsClaim: true,
            navigationPreload: true,
            runtimeCaching: defaultCache,
            fallbacks: {
              entries: [
                { url: '/offline', matcher: ({ request }) => request.destination === 'document' },
              ],
            },
          });

          serwist.addEventListeners();

        offline/page.tsx:
          export default function OfflinePage(): React.ReactElement
          - 컨테이너: min-h-dvh · flex · items-center · justify-center
          - 제목 "오프라인 상태입니다" + 부제 "네트워크 연결을 확인하고 다시 시도해 주세요"
          - 새로고침 안내 (window.location.reload)
          - 이 페이지는 'use client' (reload 버튼 사용)

        next.config.ts (수정):
          - 최상단 import: import withSerwistInit from '@serwist/next';
          - withSerwist 옵션: { swSrc: 'app/sw.ts', swDest: 'public/sw.js', cacheOnNavigation: true, reloadOnOnline: true }
          - 체이닝 순서: withSentryConfig(withSerwist(nextConfig), sentryOptions)
          - 기존 nextConfig·withSentryConfig 옵션 유지

        ## 요구사항
        - 라이브러리: @serwist/next@^9.0.0 + serwist@^9.0.0 (둘 다 devDependencies)
        - manifest.json 추가/보강 키:
          · "start_url": "/"
          · "scope": "/"
          · "background_color": "#ffffff"
          · "theme_color": "#2563eb"
          · "orientation": "portrait"
          · 기존 icons 배열 유지 (없으면 추가 안 해도 됨 — TD-008 별도)
        - sw.ts 는 Next.js 16 의 app/ 디렉토리에 두되 정적 빌드 대상에 포함되지 않게 (Serwist 가 별도 처리)

        ## 금지
        - apps/admin 디렉토리 변경 금지
        - next-pwa 라이브러리 사용 금지 (deprecated)
        - 기존 withSentryConfig 옵션 변경 금지
        - 기존 manifest.json 의 name·short_name·display·icons 삭제 금지

      gates:
        - name: "sw.ts 존재"
          command: "test -f D:/MOUNT1/apps/driver/app/sw.ts"
        - name: "offline 페이지 존재"
          command: "test -f D:/MOUNT1/apps/driver/app/offline/page.tsx"
        - name: "@serwist/next devDependency"
