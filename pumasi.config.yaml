          export const PhotoTierSchema = z.enum(['hot','warm','cold']);
          export const PhotoSchema = z.object({ ... ERD §3.6 컬럼 });
          export type Photo = z.infer<typeof PhotoSchema>;

        installation.ts:
          export const InstallationResultSchema = z.enum(['no_drill_success','drill_converted','postponed','cancelled']);
          export const InstallationSchema = z.object({ ... ERD §3.5 컬럼 });
