    - name: types-zod
      instruction: |
        D:/MOUNT1/packages/types/ 신규 패키지 생성. ERD 기반 도메인 Zod 스키마 5종.

        ## 컨텍스트
        - pnpm-workspace.yaml 의 packages: ['packages/*'] 가 자동 감지
        - TypeScript strict + noUncheckedIndexedAccess
        - ERD 기준: D:/walltvprowiki/13_PROJECT_MANAGEMENT/MOUNTPARTNERS_APP/02_IA/02_ERD.md §3
        - DB 마이그레이션과 일치 (D:/MOUNT1/supabase/migrations/0001_init.sql)

        ## 생성 파일
        - D:/MOUNT1/packages/types/package.json
        - D:/MOUNT1/packages/types/tsconfig.json
        - D:/MOUNT1/packages/types/eslint.config.mjs
        - D:/MOUNT1/packages/types/src/index.ts
        - D:/MOUNT1/packages/types/src/order.ts
        - D:/MOUNT1/packages/types/src/technician.ts
        - D:/MOUNT1/packages/types/src/customer.ts
        - D:/MOUNT1/packages/types/src/photo.ts
        - D:/MOUNT1/packages/types/src/installation.ts

