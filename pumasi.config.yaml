pumasi:
  defaults:
    command: "node C:/Windows/nvm/v22.15.1/node_modules/@openai/codex/bin/codex.js exec --dangerously-bypass-approvals-and-sandbox"
    emoji: "🤖"

  tasks:
    # ────────────────────────────────────────────────────────────
    # Task 1 · Driver Login (A01) — 기사앱 발급 ID/PW 로그인
    # ────────────────────────────────────────────────────────────
    - name: driver-login
      instruction: |
        D:/MOUNT1/apps/driver/app/(driver)/login/ 에 기사앱 로그인 화면 구현.

        ## 컨텍스트
        - Next.js 16 App Router · React 19 · Server Component + Server Action
        - 발급형 ID/PW 인증 (이메일 형식 가짜 — `technician_{username}@internal.mountpartners.cloud`)
        - 기존 `@mount/lib/auth` 의 `signInWithUsername({ username, password, userType: 'technician' })` 사용
        - 기존 `@mount/ui` 의 Button · Input · Card 사용 (이미 export 됨)
        - 기존 `@mount/lib/auth` 의 `getSession` 사용 — 이미 로그인된 경우 redirect
        - PWA 모바일 우선 — 큰 터치 영역, 50~60대 기사 가독성

        ## 생성/수정 파일
        - D:/MOUNT1/apps/driver/app/(driver)/login/page.tsx (신규 또는 기존 덮어쓰기)
        - D:/MOUNT1/apps/driver/app/(driver)/login/actions.ts (신규) — Server Action
        - D:/MOUNT1/apps/driver/app/(driver)/login/login-form.tsx (신규) — Client Component (form)

        ## 시그니처

        page.tsx (Server Component):
          import type { ReactElement } from 'react';
          export default async function LoginPage(props: {
            searchParams: Promise<{ error?: string; redirect?: string }>;
          }): Promise<ReactElement>

        actions.ts (Server Action):
          'use server';
          import type { SignInResult } from '@mount/lib';
          export async function loginAction(formData: FormData): Promise<SignInResult>

        login-form.tsx (Client Component):
          'use client';
          import type { ReactElement } from 'react';
          export interface LoginFormProps { error?: string; redirect?: string }
          export function LoginForm(props: LoginFormProps): ReactElement

        ## 요구사항

        page.tsx:
        - searchParams 의 error · redirect 추출
        - getSession() 호출 → 이미 로그인된 technician 이면 redirect('/') 또는 redirect param 으로
        - LoginForm 에 error/redirect prop 전달
        - 컨테이너: min-h-dvh · flex · items-center · justify-center · bg-background · px-4
        - 좌상단 노출 텍스트: "마운트파트너스 기사앱" h1 (text-2xl font-bold)

        actions.ts:
        - formData 에서 username · password 추출 (string 변환)
        - 둘 중 하나라도 비어있으면 { ok: false, error: '아이디와 비밀번호를 입력해 주세요.' }
        - signInWithUsername({ username, password, userType: 'technician' }) 호출
        - 결과 그대로 return (이미 SignInResult 타입)
        - try/catch 로 예상 외 에러 → { ok: false, error: '로그인 중 문제가 발생했어요. 잠시 후 다시 시도해 주세요.' }
        - 성공 시 redirect 는 호출자(form)에서 처리 (Server Action 안에서 redirect() 직접 호출하지 말 것 — error boundary 충돌)

        login-form.tsx:
        - useState · useTransition · React.useActionState 활용 (Next.js 16 표준)
        - useActionState(loginAction, { ok: false }) — initialState
        - Card · CardHeader · CardTitle · CardContent 로 감쌈
        - 두 Input: username (autoComplete='username', inputMode='text', maxLength=32, required)
                  password (type='password', autoComplete='current-password', required)
        - 큰 Button (size='lg', w-full) — 기사 모바일 터치
        - error 표시: state.error || props.error 가 있으면 빨간 배지 (text-destructive · text-sm · mt-2)
        - 폼 제출 시 isPending 동안 Button disabled · 텍스트 "로그인 중…"
        - 성공 시 (state.ok === true 그리고 state.redirect): useEffect 로 window.location.href = state.redirect || '/'
          (Client redirect — Server Action 안 redirect 회피)

        ## 라이브러리 사용 (필수 import)
        - import { Button, Input, Card, CardHeader, CardTitle, CardContent } from '@mount/ui';
        - import { signInWithUsername } from '@mount/lib';
        - import { getSession } from '@mount/lib';
        - import { redirect } from 'next/navigation';

        ## 금지
        - 외부 폼 라이브러리(react-hook-form 등) 사용 금지
        - 외부 검증 라이브러리(zod runtime check) 사용 금지 (단순 if 분기로 충분)
        - any · @ts-ignore 사용 금지
        - localStorage 직접 사용 금지 (Supabase auth 가 자동 처리)
        - inline style 사용 금지 (Tailwind className 만)

      gates:
        - name: "3 파일 존재"
          command: "test -f 'D:/MOUNT1/apps/driver/app/(driver)/login/page.tsx' && test -f 'D:/MOUNT1/apps/driver/app/(driver)/login/actions.ts' && test -f 'D:/MOUNT1/apps/driver/app/(driver)/login/login-form.tsx'"
        - name: "Server Action use server"
          command: "head -3 'D:/MOUNT1/apps/driver/app/(driver)/login/actions.ts' | grep -q 'use server'"
        - name: "Form use client"
          command: "head -3 'D:/MOUNT1/apps/driver/app/(driver)/login/login-form.tsx' | grep -q 'use client'"
        - name: "@mount/ui 사용"
          command: "grep -q '@mount/ui' 'D:/MOUNT1/apps/driver/app/(driver)/login/login-form.tsx'"
        - name: "signInWithUsername 호출"
          command: "grep -q 'signInWithUsername' 'D:/MOUNT1/apps/driver/app/(driver)/login/actions.ts'"
        - name: "userType technician"
          command: "grep -q 'technician' 'D:/MOUNT1/apps/driver/app/(driver)/login/actions.ts'"
        - name: "any 사용 없음"
          command: "! grep -nE ': any\\b|as any\\b' 'D:/MOUNT1/apps/driver/app/(driver)/login/page.tsx' 'D:/MOUNT1/apps/driver/app/(driver)/login/actions.ts' 'D:/MOUNT1/apps/driver/app/(driver)/login/login-form.tsx'"

    # ────────────────────────────────────────────────────────────
    # Task 2 · Admin Login (B01) — 관리자 발급 ID/PW + 5회 잠금
    # ────────────────────────────────────────────────────────────
    - name: admin-login
      instruction: |
        D:/MOUNT1/apps/admin/app/(auth)/login/ 에 관리자 로그인 화면 구현.

        ## 컨텍스트
        - Next.js 16 App Router · React 19 · Server Component + Server Action
        - 관리자 fake email 패턴: `{role}_{username}@internal.mountpartners.cloud` (role: super_admin/cs_admin/dispatch_admin/ops_admin/auditor)
        - admin 은 IP whitelist 추후 미들웨어 검증 (이번 task 범위 외 — IP 체크 stub만)
        - 5회 실패 잠금은 RPC 차원 (이번 task 는 UI 만 — 잠금 메시지 표시)
        - 기존 `@mount/lib/auth` 의 `signInWithUsername({ userType: 'admin', adminRoleHint })` 사용
        - 기존 `@mount/ui` 사용

        ## 생성/수정 파일
        - D:/MOUNT1/apps/admin/app/(auth)/login/page.tsx (신규 또는 기존 덮어쓰기)
        - D:/MOUNT1/apps/admin/app/(auth)/login/actions.ts (신규)
        - D:/MOUNT1/apps/admin/app/(auth)/login/login-form.tsx (신규)

        ## 시그니처

        page.tsx (Server Component):
          export default async function AdminLoginPage(props: {
            searchParams: Promise<{ error?: string; redirect?: string }>;
          }): Promise<ReactElement>

        actions.ts (Server Action):
          'use server';
          import type { SignInResult, AdminRole } from '@mount/lib';
          export async function adminLoginAction(formData: FormData): Promise<SignInResult>

        login-form.tsx (Client Component):
          'use client';
          export interface AdminLoginFormProps { error?: string; redirect?: string }
          export function AdminLoginForm(props: AdminLoginFormProps): ReactElement

        ## 요구사항

        page.tsx:
        - getSession() 호출 → 이미 admin 으로 로그인되어있으면 redirect('/')
        - 컨테이너: min-h-dvh · grid · place-items-center · bg-muted · px-4
        - 가운데 Card (max-w-md · w-full)
        - 상단: "마운트파트너스 관리자" + "허가된 IP에서만 접근 가능합니다." 안내 문구

        actions.ts:
        - formData 추출: username · password · adminRole (selected hint, 기본 'cs_admin')
        - adminRole 이 5개 enum 중 하나가 아니면 → adminRole = 'cs_admin' (기본값으로 fallback)
        - signInWithUsername({ username, password, userType: 'admin', adminRoleHint: adminRole as AdminRole })
        - SignInResult 그대로 return

        login-form.tsx:
        - useActionState 사용
        - 3 입력: 역할 Select (super_admin/cs_admin/dispatch_admin/ops_admin/auditor 한글 라벨), username Input, password Input
          (Select 는 native <select className="..."> 또는 @mount/ui 에 Select 가 없으니 native 사용)
          한글 라벨: 대표/본사CS/배차담당/쿠팡CS/감사
        - "로그인" Button (default size · w-full)
        - state.error 에 '계정이 잠겼습니다' 포함하면 추가 안내 텍스트 (text-destructive · text-sm)
          "10분 후 다시 시도하거나, 본사 CS 에 잠금 해제 요청 (kakao 채널)"
        - 성공 시 redirect '/admin' 또는 state.redirect

        ## 라이브러리 사용
        - @mount/ui 의 Button · Input · Card · CardHeader · CardTitle · CardContent · CardDescription
        - @mount/lib 의 signInWithUsername · getSession · type AdminRole

        ## 금지
        - react-hook-form · zod runtime · 외부 select 라이브러리 사용 금지
        - any 사용 금지
        - inline style 금지

      gates:
        - name: "3 파일 존재"
          command: "test -f 'D:/MOUNT1/apps/admin/app/(auth)/login/page.tsx' && test -f 'D:/MOUNT1/apps/admin/app/(auth)/login/actions.ts' && test -f 'D:/MOUNT1/apps/admin/app/(auth)/login/login-form.tsx'"
        - name: "Server Action use server"
          command: "head -3 'D:/MOUNT1/apps/admin/app/(auth)/login/actions.ts' | grep -q 'use server'"
        - name: "Form use client"
          command: "head -3 'D:/MOUNT1/apps/admin/app/(auth)/login/login-form.tsx' | grep -q 'use client'"
        - name: "userType admin"
          command: "grep -q \"userType: 'admin'\" 'D:/MOUNT1/apps/admin/app/(auth)/login/actions.ts'"
        - name: "5 역할 enum 노출"
          command: "grep -q 'super_admin' 'D:/MOUNT1/apps/admin/app/(auth)/login/login-form.tsx' && grep -q 'auditor' 'D:/MOUNT1/apps/admin/app/(auth)/login/login-form.tsx'"
        - name: "한글 라벨 (대표·감사)"
          command: "grep -q '대표' 'D:/MOUNT1/apps/admin/app/(auth)/login/login-form.tsx' && grep -q '감사' 'D:/MOUNT1/apps/admin/app/(auth)/login/login-form.tsx'"
        - name: "any 사용 없음"
          command: "! grep -nE ': any\\b|as any\\b' 'D:/MOUNT1/apps/admin/app/(auth)/login/page.tsx' 'D:/MOUNT1/apps/admin/app/(auth)/login/actions.ts' 'D:/MOUNT1/apps/admin/app/(auth)/login/login-form.tsx'"

    # ────────────────────────────────────────────────────────────
    # Task 3 · Driver Today (A02 리스트 탭) — 오늘 시공건 카드 리스트
    # ────────────────────────────────────────────────────────────
    - name: driver-today
      instruction: |
        D:/MOUNT1/apps/driver/app/(driver)/today/ 에 기사앱 오늘 페이지 구현.

        ## 컨텍스트
        - Next.js 16 App Router · React 19 · Server Component (데이터 페치)
        - DB View: `v_technician_today` (이미 0001_init.sql 에 존재 + types.generated 에 매핑)
        - View columns: order_id, assigned_technician_id, scheduled_installation_at, status, phone_tail4, region, tv, pre_call_done, photo_count
        - 기사 인증 필수 — `requireRole(['technician'])` 사용 (미로그인 시 RedirectError throw)
        - 기존 `@mount/db` getServerClient · `@mount/lib/auth` requireRole · `@mount/ui` 사용

        ## 생성/수정 파일
        - D:/MOUNT1/apps/driver/app/(driver)/today/page.tsx (신규)
        - D:/MOUNT1/apps/driver/app/(driver)/today/order-card.tsx (신규) — 카드 컴포넌트
        - D:/MOUNT1/apps/driver/app/(driver)/today/empty-state.tsx (신규) — Empty UI

        ## 시그니처

        page.tsx (Server Component):
          export default async function TodayPage(): Promise<ReactElement>

        order-card.tsx (Server Component or shared):
          export interface OrderCardData {
            order_id: string;
            scheduled_installation_at: string | null;
            status: string;
            phone_tail4: string;
            region: string;
            tv: string;
            pre_call_done: boolean;
            photo_count: number;
          }
          export function OrderCard(props: OrderCardData): ReactElement

        empty-state.tsx:
          export function EmptyState(): ReactElement

        ## 요구사항

        page.tsx:
        - try/catch RedirectError → next/navigation 의 redirect('/login?redirect=/') 호출
        - 인증 통과 후 getServerClient() → .from('v_technician_today').select('*').order('scheduled_installation_at', { ascending: true })
        - 결과 비어있으면 <EmptyState />
        - 결과 있으면 grid (mobile: 1열) 으로 OrderCard 매핑
        - 컨테이너: min-h-dvh · safe-top · safe-bottom · max-w-screen-md · mx-auto · px-4 · py-6
        - 상단 헤더: h1 "오늘의 시공" + 우측 작은 텍스트 (오늘 날짜 한국식 — Intl.DateTimeFormat 'ko-KR')

        order-card.tsx:
        - Card · CardHeader (시각·상태 Badge) · CardContent (지역·TV·전화 뒷자리)
        - 시각: scheduled_installation_at → Intl.DateTimeFormat ko-KR (HH:mm) (null 이면 '시간 미정')
        - 상태 Badge variant 매핑: assigned/en_route='secondary', on_site/in_progress='default', no_drill_completed/drill_converted_completed='outline'
        - 30분 전 통화 미완료 시 좌측 빨간 점 + "통화 필요" Badge (variant='destructive')
        - 사진 진행도: "사진 {photo_count}/6" (6장 = pre 2 + post 3 + extra 1 권장)
        - 카드 우상단에 ChevronRight 아이콘 (lucide-react) — 향후 상세 진입 hint
        - 카드 전체 클릭 가능 — Link href={`/order/${order_id}`} 로 감쌈 (next/link)
        - 큰 터치 영역: padding 충분 · text 가독성 (50대 기사 — base size 이상)

        empty-state.tsx:
        - 가운데 정렬, 큰 아이콘 (CalendarX from lucide-react)
        - "오늘 배차된 주문이 없어요" 제목 + "캘린더에서 다른 날짜를 확인해보세요" 부제
        - "캘린더 보기" Button (variant='outline') — Link href='/calendar' (placeholder)

        ## 라이브러리 사용
        - @mount/db: getServerClient (Database 타입은 자동 추론)
        - @mount/lib: requireRole, RedirectError
        - @mount/ui: Card · CardHeader · CardTitle · CardContent · Badge · Button · Skeleton
        - lucide-react: ChevronRight · CalendarX
        - next/link · next/navigation (redirect)

        ## 금지
        - 클라이언트 fetch 금지 (Server Component 만)
        - SWR · TanStack Query 등 client cache 라이브러리 금지 (이 화면은 서버 렌더 only)
        - any 사용 금지
        - inline style 금지

      gates:
        - name: "3 파일 존재"
          command: "test -f 'D:/MOUNT1/apps/driver/app/(driver)/today/page.tsx' && test -f 'D:/MOUNT1/apps/driver/app/(driver)/today/order-card.tsx' && test -f 'D:/MOUNT1/apps/driver/app/(driver)/today/empty-state.tsx'"
        - name: "v_technician_today 뷰 사용"
          command: "grep -q 'v_technician_today' 'D:/MOUNT1/apps/driver/app/(driver)/today/page.tsx'"
        - name: "requireRole technician"
          command: "grep -q 'requireRole' 'D:/MOUNT1/apps/driver/app/(driver)/today/page.tsx' && grep -q 'technician' 'D:/MOUNT1/apps/driver/app/(driver)/today/page.tsx'"
        - name: "RedirectError 처리"
          command: "grep -q 'RedirectError' 'D:/MOUNT1/apps/driver/app/(driver)/today/page.tsx'"
        - name: "Card 컴포넌트 사용"
          command: "grep -q 'Card' 'D:/MOUNT1/apps/driver/app/(driver)/today/order-card.tsx'"
        - name: "lucide ChevronRight"
          command: "grep -q 'ChevronRight' 'D:/MOUNT1/apps/driver/app/(driver)/today/order-card.tsx'"
        - name: "EmptyState lucide CalendarX"
          command: "grep -q 'CalendarX' 'D:/MOUNT1/apps/driver/app/(driver)/today/empty-state.tsx'"
        - name: "any 사용 없음"
          command: "! grep -nE ': any\\b|as any\\b' 'D:/MOUNT1/apps/driver/app/(driver)/today/page.tsx' 'D:/MOUNT1/apps/driver/app/(driver)/today/order-card.tsx' 'D:/MOUNT1/apps/driver/app/(driver)/today/empty-state.tsx'"

    # ────────────────────────────────────────────────────────────
    # Task 4 · Admin Today (B02) — 관리자 KPI 대시보드 메인
    # ────────────────────────────────────────────────────────────
    - name: admin-today
      instruction: |
        D:/MOUNT1/apps/admin/app/(admin)/today/ 에 관리자 KPI 대시보드 메인 구현.
        라우팅: '/' 가 아닌 '/today' 경로로 (root 는 기존 /login 또는 redirect 처리).

        ## 컨텍스트
        - Next.js 16 App Router · React 19 · Server Component
        - DB View: `v_orders_dashboard` (0001_init.sql 존재, types.generated 매핑)
        - 관리자 인증 필수 — `requireRole(['admin'])` 사용
        - admin 은 desktop 우선 (1280px+)
        - 4 KPI 카드: 오늘 배차 / 진행 중 / 완료 / 취소
        - 미배차 알림 배너 (assigned_technician_name IS NULL 카운트)
        - 기사별 건수 막대 (간단한 div 기반 — 차트 라이브러리 X)

        ## 생성/수정 파일
        - D:/MOUNT1/apps/admin/app/(admin)/today/page.tsx (신규)
        - D:/MOUNT1/apps/admin/app/(admin)/today/kpi-card.tsx (신규)
        - D:/MOUNT1/apps/admin/app/(admin)/today/unassigned-banner.tsx (신규)
        - D:/MOUNT1/apps/admin/app/(admin)/today/technician-bars.tsx (신규)

        ## 시그니처

        page.tsx (Server Component):
          export default async function AdminTodayPage(): Promise<ReactElement>

        kpi-card.tsx:
          export interface KpiCardProps {
            label: string;
            value: number | string;
            hint?: string;
            tone?: 'default' | 'success' | 'warning' | 'destructive';
          }
          export function KpiCard(props: KpiCardProps): ReactElement

        unassigned-banner.tsx:
          export interface UnassignedBannerProps { count: number }
          export function UnassignedBanner(props: UnassignedBannerProps): ReactElement

        technician-bars.tsx:
          export interface TechnicianStat { name: string; count: number }
          export interface TechnicianBarsProps { stats: TechnicianStat[]; max: number }
          export function TechnicianBars(props: TechnicianBarsProps): ReactElement

        ## 요구사항

        page.tsx:
        - try/catch RedirectError → redirect('/login?redirect=/today')
        - getServerClient() 로 다음 4개 쿼리 병렬 (Promise.all):
          1) 오늘 시공건: from('v_orders_dashboard').select('id, status, technician_name', { count: 'exact' })
             .gte('scheduled_installation_at', 오늘 KST 00:00) .lt(오늘 KST 24:00)
          2) 진행중: status in ('en_route','on_site','in_progress')
          3) 완료(오늘): status in ('no_drill_completed','drill_converted_completed','paid','closed') and scheduled today
          4) 취소(오늘): status in ('cancel_requested','cancel_confirmed_coupang_transfer')
        - 미배차: 위 1) 결과에서 technician_name === null 카운트
        - 기사별 stats: 1) 결과를 technician_name 별로 group + 카운트 (자바스크립트 reduce)
        - 컨테이너: min-h-dvh · max-w-screen-2xl · mx-auto · px-6 · py-8
        - 헤더: h1 "오늘 운영 현황" + 우측 새로고침 시각 (Intl.DateTimeFormat ko-KR)
        - <UnassignedBanner count={...} /> (count > 0 일 때만 렌더)
        - 4 KPI grid (md:grid-cols-4 · gap-4)
        - 하단 <TechnicianBars stats={...} max={...} />

        kpi-card.tsx:
        - Card · CardContent
        - label 작은 (text-sm · text-muted-foreground)
        - value 큰 (text-3xl · font-bold)
        - hint 보조 (text-xs · text-muted-foreground)
        - tone='destructive' 면 좌측 빨간 줄 (border-l-4 border-destructive)
        - tone='warning' 면 좌측 노란 줄 (border-l-4 border-warning)
        - tone='success' 면 좌측 초록 줄 (border-l-4 border-success)

        unassigned-banner.tsx:
        - bg-warning/10 · border · border-warning · rounded · px-4 · py-3 · flex · items-center · gap-3
        - 좌측 AlertCircle 아이콘 (lucide-react)
        - 텍스트: "미배차 {count}건이 있습니다." + 작은 부제 "배차 콘솔에서 처리해 주세요."
        - 우측 Button (size='sm' · variant='outline') Link href='/dispatch' "배차 콘솔"

        technician-bars.tsx:
        - Card · CardHeader (CardTitle "기사별 오늘 건수")
        - CardContent: stats.map (이름 + 건수 + 막대)
          · 막대: <div className="h-2 bg-primary rounded" style={{ width: ... }} />
          ⚠ inline style width 만은 예외 허용 (% 동적 값)
        - 빈 stats: "오늘 배차된 기사가 없습니다." 안내

        ## 라이브러리 사용
        - @mount/db: getServerClient
        - @mount/lib: requireRole, RedirectError
        - @mount/ui: Card · CardHeader · CardTitle · CardContent · Button
        - lucide-react: AlertCircle
        - next/link · next/navigation

        ## 금지
        - recharts · chart.js 등 차트 라이브러리 금지 (technician-bars 는 div 기반)
        - 클라이언트 fetch 금지 (Server Component)
        - any 사용 금지

      gates:
        - name: "4 파일 존재"
          command: "test -f 'D:/MOUNT1/apps/admin/app/(admin)/today/page.tsx' && test -f 'D:/MOUNT1/apps/admin/app/(admin)/today/kpi-card.tsx' && test -f 'D:/MOUNT1/apps/admin/app/(admin)/today/unassigned-banner.tsx' && test -f 'D:/MOUNT1/apps/admin/app/(admin)/today/technician-bars.tsx'"
        - name: "v_orders_dashboard 뷰 사용"
          command: "grep -q 'v_orders_dashboard' 'D:/MOUNT1/apps/admin/app/(admin)/today/page.tsx'"
        - name: "requireRole admin"
          command: "grep -q 'requireRole' 'D:/MOUNT1/apps/admin/app/(admin)/today/page.tsx' && grep -q \"'admin'\" 'D:/MOUNT1/apps/admin/app/(admin)/today/page.tsx'"
        - name: "Promise.all 사용"
          command: "grep -q 'Promise.all' 'D:/MOUNT1/apps/admin/app/(admin)/today/page.tsx'"
        - name: "KpiCard tone variants"
          command: "grep -q 'destructive' 'D:/MOUNT1/apps/admin/app/(admin)/today/kpi-card.tsx' && grep -q 'success' 'D:/MOUNT1/apps/admin/app/(admin)/today/kpi-card.tsx'"
        - name: "AlertCircle lucide"
          command: "grep -q 'AlertCircle' 'D:/MOUNT1/apps/admin/app/(admin)/today/unassigned-banner.tsx'"
        - name: "TechnicianBars inline width 만"
          command: "grep -q 'style={{' 'D:/MOUNT1/apps/admin/app/(admin)/today/technician-bars.tsx'"
        - name: "any 사용 없음"
          command: "! grep -nE ': any\\b|as any\\b' 'D:/MOUNT1/apps/admin/app/(admin)/today/page.tsx' 'D:/MOUNT1/apps/admin/app/(admin)/today/kpi-card.tsx' 'D:/MOUNT1/apps/admin/app/(admin)/today/unassigned-banner.tsx' 'D:/MOUNT1/apps/admin/app/(admin)/today/technician-bars.tsx'"
