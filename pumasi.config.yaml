        ## 시그니처 (각 파일별)

        order.ts:
          export const OrderStatusSchema = z.enum([...18 개 ERD §3.4 status 값 정확히]);
          export type OrderStatus = z.infer<typeof OrderStatusSchema>;
          export const OrderOptionSchema = z.enum(['A_stand', 'B_drill', 'C_no_drill']);
          export type OrderOption = z.infer<typeof OrderOptionSchema>;
          export const OrderSchema = z.object({ ... ERD §3.4 모든 컬럼 (id uuid, coupang_order_id, ...) });
          export type Order = z.infer<typeof OrderSchema>;

        technician.ts:
          export const TechnicianGradeSchema = z.enum(['bronze','silver','gold']);
          export const TechnicianStatusSchema = z.enum(['active','paused','terminated']);
          export const TechnicianSchema = z.object({ ... ERD §3.1 컬럼 });
          export type Technician = z.infer<typeof TechnicianSchema>;

        customer.ts:
          export const CustomerSchema = z.object({ ... ERD §3.2 컬럼 (단 _encrypted 필드는 z.instanceof(Uint8Array) 또는 z.unknown() 으로 둠 — bytea 표현 추상화) });
          export type Customer = z.infer<typeof CustomerSchema>;
          export const CustomerForTechnicianSchema = z.object({ id, phone_tail4, address_region_sido, address_region_sigungu, address_lat, address_lng });
          export type CustomerForTechnician = z.infer<typeof CustomerForTechnicianSchema>;

        photo.ts:
