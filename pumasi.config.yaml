        ## 요구사항
        - 라이브러리: zod@^3.24.1 (다른 검증 라이브러리 금지)
        - 모든 timestamptz → z.string().datetime() 또는 z.coerce.date()
        - uuid → z.string().uuid()
        - numeric(10,7) lat/lng → z.number()
        - jsonb → z.unknown() 또는 z.record(z.unknown())
        - text[] → z.array(z.string())
        - check 제약(예: status enum, grade enum) → z.enum() 그대로 매핑
        - 모든 .nullable() · .optional() 명시 (DB nullable 컬럼 = .nullable())
        - 코멘트는 한국어 한 줄 (왜 nullable 인지 등 ERD 근거 표기)

        ## 금지
        - any · z.any() 사용 금지 (z.unknown() 사용)
        - 임의 enum 값 추가 금지 — ERD §3 정의 그대로
        - 각 파일이 다른 파일 import 금지 (전부 독립)

