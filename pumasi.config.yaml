pumasi:
  defaults:
    # Windows: .cmd shim 은 spawn EINVAL 발생 → node 로 직접 ESM entry 실행
    command: "node C:/Windows/nvm/v22.15.1/node_modules/@openai/codex/bin/codex.js exec --dangerously-bypass-approvals-and-sandbox"
    emoji: "🤖"

  tasks:
    # ────────────────────────────────────────────────────────────
    # Task 1 · @mount/db Supabase 클라이언트 3종
    # ────────────────────────────────────────────────────────────
    - name: db-clients
      instruction: |
        D:/MOUNT1/packages/db/ 에 Supabase 클라이언트 3종을 구현하세요.

        ## 컨텍스트
        - pnpm workspace monorepo · TypeScript 5.7 strict + noUncheckedIndexedAccess
        - Next.js 16.2.4 App Router · React 19
        - Supabase 신 API 키 형식(sb_publishable_*, sb_secret_*)
        - Database 타입은 './types.generated' 에서 import (이미 placeholder 존재)

        ## 생성/수정 파일
        - D:/MOUNT1/packages/db/src/client.ts (신규) — 브라우저 singleton
        - D:/MOUNT1/packages/db/src/server.ts (신규) — Server Component / Server Action
        - D:/MOUNT1/packages/db/src/admin.ts  (신규) — service role · server only
        - D:/MOUNT1/packages/db/src/index.ts  (수정) — client/server 만 re-export (admin 제외)
        - D:/MOUNT1/packages/db/package.json  (수정) — 의존성 추가

        ## 시그니처 (정확히 이대로)

        client.ts:
          import type { Database } from './types.generated';
          import type { SupabaseClient } from '@supabase/supabase-js';
          export function getBrowserClient(): SupabaseClient<Database>

        server.ts:
          import type { Database } from './types.generated';
          import type { SupabaseClient } from '@supabase/supabase-js';
          export function getServerClient(): Promise<SupabaseClient<Database>>

        admin.ts:
          import 'server-only';
          import type { Database } from './types.generated';
          import type { SupabaseClient } from '@supabase/supabase-js';
          export function getAdminClient(): SupabaseClient<Database>

        ## 요구사항
        - 라이브러리: @supabase/ssr@^0.5.2 (createBrowserClient·createServerClient) + @supabase/supabase-js@^2.45.0 (createClient)
        - 환경변수: NEXT_PUBLIC_SUPABASE_URL, NEXT_PUBLIC_SUPABASE_ANON_KEY (두 client 용) · SUPABASE_SERVICE_ROLE_KEY (admin 만)
        - 환경변수 누락 시 throw new Error('NEXT_PUBLIC_SUPABASE_URL is required') 형식 명시 에러
        - client.ts: 모듈 최상단 let 변수로 singleton 캐시 (한 번 생성 후 재사용)
        - server.ts: next/headers 의 cookies() 활용. createServerClient<Database>(url, key, { cookies: { getAll, setAll } })
          · getAll → cookieStore.getAll() · setAll → for (const c of cookies) try { cookieStore.set(c.name, c.value, c.options); } catch { /* Server Component 무시 */ }
        - admin.ts: createClient<Database>(url, serviceKey, { auth: { persistSession: false, autoRefreshToken: false } })
          · 'server-only' 첫 줄 import 필수
        - index.ts: 기존 `export type { Database } from './types.generated';` 유지 + getBrowserClient, getServerClient 만 추가 export. admin 은 절대 re-export 금지.

        ## package.json 변경 (dependencies 에 추가)
        - "@supabase/ssr": "^0.5.2"
        - "@supabase/supabase-js": "^2.45.0"
        기존 devDependencies 변경 금지.

        ## 금지
        - 함수 시그니처 변경 금지
        - createBrowserClient·createServerClient·createClient 외 다른 SDK 함수 사용 금지
        - any 캐스트, @ts-ignore, eslint-disable 사용 금지
        - 코드 주석은 한국어 한 줄만 (왜 이렇게 했는지)

        ## 완료 보고
        - 생성 파일 경로 + 각 함수 한 줄 요약
        - cookies adapter 의 setAll try/catch 처리 위치

      gates:
        - name: "파일 4종 존재"
          command: "test -f D:/MOUNT1/packages/db/src/client.ts && test -f D:/MOUNT1/packages/db/src/server.ts && test -f D:/MOUNT1/packages/db/src/admin.ts && test -f D:/MOUNT1/packages/db/src/index.ts"
        - name: "@supabase/ssr 의존성"
          command: "grep -q '@supabase/ssr' D:/MOUNT1/packages/db/package.json"
        - name: "@supabase/supabase-js 의존성"
          command: "grep -q '@supabase/supabase-js' D:/MOUNT1/packages/db/package.json"
        - name: "client.ts createBrowserClient"
          command: "grep -q 'createBrowserClient' D:/MOUNT1/packages/db/src/client.ts"
        - name: "server.ts cookies adapter"
          command: "grep -q 'createServerClient' D:/MOUNT1/packages/db/src/server.ts && grep -q 'next/headers' D:/MOUNT1/packages/db/src/server.ts"
        - name: "admin.ts server-only"
          command: "head -3 D:/MOUNT1/packages/db/src/admin.ts | grep -q 'server-only'"
        - name: "index.ts 에 admin export 없음"
          command: "! grep -q 'getAdminClient' D:/MOUNT1/packages/db/src/index.ts"
        - name: "index.ts 에 browser/server export"
          command: "grep -q 'getBrowserClient' D:/MOUNT1/packages/db/src/index.ts && grep -q 'getServerClient' D:/MOUNT1/packages/db/src/index.ts"

    # ────────────────────────────────────────────────────────────
    # Task 2 · @mount/lib/auth 인증 helpers
    # ────────────────────────────────────────────────────────────
    - name: auth-helpers
      instruction: |
        D:/MOUNT1/packages/lib/src/auth/ 디렉토리를 신규 생성하고 인증 helpers 5종 작성.

        ## 컨텍스트
        - Next.js 16 App Router · TypeScript strict
        - 발급형 ID/PW (이메일 형식 가짜 — `{role}_{username}@internal.mountpartners.cloud`)
        - JWT app_metadata claim: user_type('admin'|'technician') · admin_role · technician_id · admin_user_id
          (이미 0004_hooks.sql 의 custom_access_token_hook 가 주입)
        - DB 클라이언트는 @mount/db 의 getBrowserClient() / getServerClient() 사용

        ## 생성 파일
        - D:/MOUNT1/packages/lib/src/auth/sign-in.ts
        - D:/MOUNT1/packages/lib/src/auth/sign-out.ts
        - D:/MOUNT1/packages/lib/src/auth/session.ts
        - D:/MOUNT1/packages/lib/src/auth/require-role.ts
        - D:/MOUNT1/packages/lib/src/auth/index.ts

        ## 수정 파일
        - D:/MOUNT1/packages/lib/src/index.ts — auth 모듈 re-export 추가
        - D:/MOUNT1/packages/lib/package.json — dependencies 에 @mount/db: "workspace:*" 추가

        ## 시그니처

        sign-in.ts (Server Action 에서 호출):
          export type AdminRole = 'super_admin' | 'cs_admin' | 'dispatch_admin' | 'ops_admin' | 'auditor';
          export type UserType = 'admin' | 'technician';

          export interface SignInResult {
            ok: boolean;
            error?: string;
            redirect?: string;
          }

          /** 발급형 ID 로그인 — username 을 fake email 로 변환 후 supabase.auth.signInWithPassword */
          export async function signInWithUsername(args: {
            username: string;
            password: string;
            userType: UserType;
            adminRoleHint?: AdminRole;
          }): Promise<SignInResult>

        sign-out.ts:
          export async function signOut(): Promise<void>

        session.ts (Server Component 에서 호출):
          export interface AppSession {
            userId: string;
            userType: UserType | null;
            adminRole: AdminRole | null;
            technicianId: string | null;
            adminUserId: string | null;
          }

          /** 현재 세션 조회. 미로그인 시 null */
          export async function getSession(): Promise<AppSession | null>

        require-role.ts (Server Component / middleware 외부 helper):
          export async function requireRole(
            allowed: UserType[] | { adminRoles: AdminRole[] }
          ): Promise<AppSession>

          /** 통과 시 AppSession 반환. 미로그인 → throw RedirectError('/login'). 권한 부족 → throw ForbiddenError */

        index.ts:
          - 위 모든 type · function re-export

        ## 요구사항
        - sign-in.ts:
          · userType==='admin' 일 땐 fake email = `${adminRoleHint}_${username}@internal.mountpartners.cloud` (adminRoleHint 없으면 'cs_admin' 기본)
          · userType==='technician' 일 땐 fake email = `technician_${username}@internal.mountpartners.cloud`
          · @mount/db 의 getServerClient() 사용
          · Supabase 에러 → SignInResult { ok: false, error: '아이디 또는 비밀번호가 올바르지 않습니다.' } (실제 에러 메시지 노출 금지)
          · 성공 시 { ok: true, redirect: userType==='admin' ? '/admin' : '/' }
        - sign-out.ts:
          · getServerClient().auth.signOut() 호출. throw 안 함 (silent)
        - session.ts:
          · getServerClient().auth.getUser() 결과의 user.app_metadata 에서 user_type / admin_role / technician_id / admin_user_id 추출
          · user 없으면 null 반환
        - require-role.ts:
          · 자체 RedirectError·ForbiddenError 클래스 정의 (export class RedirectError extends Error { constructor(public to: string) ... })
          · 통과 조건: getSession() 결과가 null 이 아니고 (allowed 가 array 면) userType in allowed, ({adminRoles}) 면 adminRole in adminRoles
          · 실패 시 throw 위 두 에러 중 적합한 것

        ## 의존성 (lib/package.json dependencies)
        - "@mount/db": "workspace:*" 추가

        ## 금지
        - import 'server-only' 사용 금지 (auth helpers 는 Server Action / Server Component 양쪽에서 호출)
        - try/catch 로 silent 실패 금지 (signOut 만 예외)
        - any 캐스트 금지

      gates:
        - name: "5 파일 존재"
          command: "test -f D:/MOUNT1/packages/lib/src/auth/sign-in.ts && test -f D:/MOUNT1/packages/lib/src/auth/sign-out.ts && test -f D:/MOUNT1/packages/lib/src/auth/session.ts && test -f D:/MOUNT1/packages/lib/src/auth/require-role.ts && test -f D:/MOUNT1/packages/lib/src/auth/index.ts"
        - name: "@mount/db 의존성"
          command: "grep -q '@mount/db' D:/MOUNT1/packages/lib/package.json"
        - name: "sign-in fake email 패턴"
          command: "grep -q 'internal.mountpartners.cloud' D:/MOUNT1/packages/lib/src/auth/sign-in.ts"
        - name: "session app_metadata 사용"
          command: "grep -q 'app_metadata' D:/MOUNT1/packages/lib/src/auth/session.ts"
        - name: "require-role 클래스 정의"
          command: "grep -q 'RedirectError' D:/MOUNT1/packages/lib/src/auth/require-role.ts && grep -q 'ForbiddenError' D:/MOUNT1/packages/lib/src/auth/require-role.ts"
        - name: "lib/index.ts re-export"
          command: "grep -q 'auth' D:/MOUNT1/packages/lib/src/index.ts"
        - name: "any 사용 없음"
          command: "! grep -nE ': any\\b|as any\\b' D:/MOUNT1/packages/lib/src/auth/sign-in.ts D:/MOUNT1/packages/lib/src/auth/session.ts D:/MOUNT1/packages/lib/src/auth/require-role.ts"

    # ────────────────────────────────────────────────────────────
    # Task 3 · @mount/ui shadcn 컴포넌트 7종
    # ────────────────────────────────────────────────────────────
    - name: ui-components
      instruction: |
        D:/MOUNT1/packages/ui/src/ 에 shadcn/ui (New York style) 표준 컴포넌트 7종 추가.

        ## 컨텍스트
        - 기존 button.tsx 가 shadcn New York 표준 cva 패턴으로 작성됨 (참조: D:/MOUNT1/packages/ui/src/button.tsx)
        - cn 유틸: D:/MOUNT1/packages/ui/src/cn.ts (twMerge + clsx)
        - Tailwind preset: D:/MOUNT1/packages/config/tailwind.preset.ts (shadcn 토큰 활성)
        - 색상 컨벤션: bg-primary · text-foreground · border-input · bg-destructive · hsl(var(--*))

        ## 생성 파일 (shadcn New York 정확히 그대로)
        - D:/MOUNT1/packages/ui/src/input.tsx
        - D:/MOUNT1/packages/ui/src/card.tsx
        - D:/MOUNT1/packages/ui/src/badge.tsx
        - D:/MOUNT1/packages/ui/src/skeleton.tsx
        - D:/MOUNT1/packages/ui/src/separator.tsx
        - D:/MOUNT1/packages/ui/src/dialog.tsx
        - D:/MOUNT1/packages/ui/src/sheet.tsx

        ## 수정 파일
        - D:/MOUNT1/packages/ui/src/index.ts — 새 컴포넌트 export 추가
        - D:/MOUNT1/packages/ui/package.json — Radix 의존성 4종 추가

        ## 시그니처 요약 (Codex 가 shadcn New York 공식 소스 그대로 구현)

        input.tsx:
          export type InputProps = React.InputHTMLAttributes<HTMLInputElement>;
          export const Input: React.ForwardRefExoticComponent<InputProps & React.RefAttributes<HTMLInputElement>>;

        card.tsx (sub-components):
          export const Card · CardHeader · CardTitle · CardDescription · CardContent · CardFooter
          (모두 forwardRef + cn merge)

        badge.tsx (cva):
          export const badgeVariants: ReturnType<typeof cva>;
          export interface BadgeProps extends React.HTMLAttributes<HTMLDivElement>, VariantProps<typeof badgeVariants> {}
          export function Badge(props: BadgeProps): JSX.Element;
          variants: default · secondary · destructive · outline

        skeleton.tsx:
          export function Skeleton(props: React.HTMLAttributes<HTMLDivElement>): JSX.Element;
          (기본 클래스: animate-pulse rounded-md bg-muted)

        separator.tsx (Radix Separator):
          export const Separator: React.ForwardRefExoticComponent<...>;
          orientation horizontal | vertical · decorative true

        dialog.tsx (Radix Dialog primitive):
          export const Dialog · DialogTrigger · DialogPortal · DialogOverlay · DialogContent · DialogHeader · DialogFooter · DialogTitle · DialogDescription · DialogClose

        sheet.tsx (Radix Dialog 기반 + side variant):
          export const Sheet · SheetTrigger · SheetClose · SheetContent · SheetHeader · SheetFooter · SheetTitle · SheetDescription
          variants(side): top · right · bottom · left (cva)

        ## 요구사항
        - 모든 컴포넌트는 shadcn/ui 공식 New York 스타일 그대로 (https://ui.shadcn.com/r/styles/new-york-v4)
        - cn import: import { cn } from './cn';
        - cva import: import { cva, type VariantProps } from 'class-variance-authority';
        - lucide 아이콘: dialog/sheet 의 close 버튼은 X 아이콘 (import { X } from 'lucide-react')
        - JSX.Element 대신 React.ReactElement 또는 implicit return 가능 (Next.js 16 권장)
        - 'use client' directive: dialog.tsx · sheet.tsx · separator.tsx · input.tsx 첫 줄에 추가
          (Radix primitive 가 useState/useContext 사용)

        ## index.ts 추가 export 패턴
          export { Input } from './input';
          export type { InputProps } from './input';
          export { Card, CardHeader, CardTitle, CardDescription, CardContent, CardFooter } from './card';
          export { Badge, badgeVariants } from './badge';
          export type { BadgeProps } from './badge';
          export { Skeleton } from './skeleton';
          export { Separator } from './separator';
          export { Dialog, DialogTrigger, DialogPortal, DialogOverlay, DialogContent, DialogHeader, DialogFooter, DialogTitle, DialogDescription, DialogClose } from './dialog';
          export { Sheet, SheetTrigger, SheetClose, SheetContent, SheetHeader, SheetFooter, SheetTitle, SheetDescription } from './sheet';

        ## package.json dependencies 에 추가
        - "@radix-ui/react-dialog": "^1.1.4"
        - "@radix-ui/react-separator": "^1.1.1"
        (이미 있는 @radix-ui/react-slot · class-variance-authority · clsx · lucide-react · tailwind-merge 는 그대로)

        ## 금지
        - shadcn cli 직접 실행 금지 (오프라인 작성)
        - any · @ts-ignore 사용 금지
        - 추가 외부 라이브러리 사용 금지 (위 7종 · 기존 의존성만)

      gates:
        - name: "7 파일 존재"
          command: "for f in input card badge skeleton separator dialog sheet; do test -f D:/MOUNT1/packages/ui/src/$f.tsx || exit 1; done"
        - name: "Radix dialog 의존성"
          command: "grep -q '@radix-ui/react-dialog' D:/MOUNT1/packages/ui/package.json"
        - name: "Radix separator 의존성"
          command: "grep -q '@radix-ui/react-separator' D:/MOUNT1/packages/ui/package.json"
        - name: "dialog use client"
          command: "head -1 D:/MOUNT1/packages/ui/src/dialog.tsx | grep -q 'use client'"
        - name: "sheet use client"
          command: "head -1 D:/MOUNT1/packages/ui/src/sheet.tsx | grep -q 'use client'"
        - name: "card sub-components"
          command: "grep -q 'CardHeader' D:/MOUNT1/packages/ui/src/card.tsx && grep -q 'CardContent' D:/MOUNT1/packages/ui/src/card.tsx"
        - name: "badge cva variants"
          command: "grep -q 'badgeVariants' D:/MOUNT1/packages/ui/src/badge.tsx && grep -q 'destructive' D:/MOUNT1/packages/ui/src/badge.tsx"
        - name: "index.ts 에 8 신규 export"
          command: "grep -q 'Input' D:/MOUNT1/packages/ui/src/index.ts && grep -q 'CardHeader' D:/MOUNT1/packages/ui/src/index.ts && grep -q 'Dialog' D:/MOUNT1/packages/ui/src/index.ts && grep -q 'Sheet' D:/MOUNT1/packages/ui/src/index.ts"
        - name: "any 사용 없음"
          command: "! grep -rE ': any\\b|as any\\b' D:/MOUNT1/packages/ui/src/input.tsx D:/MOUNT1/packages/ui/src/card.tsx D:/MOUNT1/packages/ui/src/dialog.tsx D:/MOUNT1/packages/ui/src/sheet.tsx"

    # ────────────────────────────────────────────────────────────
    # Task 4 · @mount/types Zod 도메인 스키마 (신규 패키지)
